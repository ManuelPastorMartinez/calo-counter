<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Calo-Counter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="pagina-centrada">
    <div class="contenedor">
        <div class="tarjeta-formulario">
            <img src="logo.png" alt="Calo-Counter Logo" class="logo" style="width: 50%; height: 70%;">
            <h2>¡Bienvenido!</h2>
            <p>Inicia sesión en tu cuenta.</p>
            
            <form id="formLogin">
                <input type="email" id="loginEmail" placeholder="Correo electrónico" required>
                <input type="password" id="loginPassword" placeholder="Contraseña" required>
                
                <button type="submit" class="boton-principal">Entrar</button>
            </form>
            
            <div class="texto-pie">
                ¿No tienes cuenta? <a href="registrarse.html">Regístrate gratis</a>
            </div>
        </div>
    </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
